<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Foodie Express</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:sans-serif}
body{background:#f2f2f2}

/* HEADER */
.header{
display:flex;
justify-content:space-between;
align-items:center;
padding:12px;
background:#fff;
position:sticky;
top:0;
z-index:10;
box-shadow:0 2px 8px rgba(0,0,0,0.1);
}

.search{
width:60%;
padding:8px;
border-radius:20px;
border:1px solid #ccc;
}

.cart-btn{
background:#000;color:#fff;
padding:8px 14px;
border-radius:20px;
cursor:pointer;
}

/* GRID */
.container{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(230px,1fr));
gap:16px;
padding:16px;
}

/* CARD */
.card{
background:#fff;
border-radius:12px;
overflow:hidden;
box-shadow:0 3px 10px rgba(0,0,0,0.1);
display:flex;
flex-direction:column;
}

.card img{
width:100%;
height:150px;
object-fit:cover;
}

.card-body{
padding:10px;
flex:1;
display:flex;
flex-direction:column;
justify-content:space-between;
}

.title{
font-weight:bold;
margin-bottom:4px;
}

.restaurant{
font-size:12px;
color:#666;
}

.price{
font-weight:bold;
margin-top:4px;
}

.btn{
margin-top:8px;
padding:8px;
border:none;
border-radius:6px;
background:#ff5a5f;
color:#fff;
cursor:pointer;
}

/* STEP CONTROL */
.qty-box{
display:flex;
justify-content:space-between;
align-items:center;
margin-top:8px;
}

.qty-btn{
padding:3px 8px;
border:1px solid #ccc;
cursor:pointer;
}

/* CART */
.cart{
position:fixed;
right:-400px;
top:0;
width:380px;
height:100%;
background:#fff;
box-shadow:-4px 0 12px rgba(0,0,0,0.2);
padding:15px;
transition:0.3s;
overflow:auto;
}

.cart.active{right:0}

.cart-item{
display:flex;
justify-content:space-between;
margin:10px 0;
border-bottom:1px solid #eee;
padding-bottom:5px;
}

/* FORM */
input,select{
width:100%;
padding:8px;
margin-top:6px;
border:1px solid #ccc;
border-radius:5px;
}

.checkout{
margin-top:10px;
padding:10px;
background:green;
color:#fff;
border:none;
width:100%;
border-radius:6px;
cursor:pointer;
}

.success{
color:green;
text-align:center;
margin-top:20px;
}
</style>
</head>

<body>

<div class="header">
<input class="search" placeholder="Search food..." onkeyup="searchFood(this.value)">
<div class="cart-btn" onclick="toggleCart()">🛒 (<span id="count">0</span>)</div>
</div>

<div class="container" id="foodList"></div>

<div class="cart" id="cart">
<h2>Checkout</h2>
<div id="cartItems"></div>
<h3 id="total"></h3>

<h4>Delivery Details</h4>
<input id="name" placeholder="Full Name">
<input id="phone" placeholder="Phone">
<input id="address" placeholder="Address">

<h4>Payment</h4>
<select id="payment">
<option value="">Select</option>
<option>Cash on Delivery</option>
<option>UPI</option>
<option>Card</option>
</select>

<button class="checkout" onclick="placeOrder()">Place Order</button>

<div id="msg"></div>
</div>

<script>

/* CLEAN DATA */
const foods=[
{name:"Chicken Biryani",price:220,unit:"plate",rest:"Biryani House",img:"https://images.unsplash.com/photo-1604908176997-125f25cc6f3d"},
{name:"Veg Biryani",price:180,unit:"plate",rest:"Biryani House",img:"https://images.unsplash.com/photo-1633945274303-b0c54b9d4a1b"},
{name:"Masala Dosa",price:80,unit:"piece",rest:"South Cafe",img:"https://images.unsplash.com/photo-1617196034736-26c5f7c977ce"},
{name:"Idli",price:60,unit:"2 pcs",rest:"South Cafe",img:"https://images.unsplash.com/photo-1625937286074-9ca519d5d9c5"},
{name:"Samosa",price:30,unit:"piece",rest:"Snack Corner",img:"https://images.unsplash.com/photo-1601050690597-df0568f70950"},
{name:"Paneer Butter Masala",price:200,unit:"bowl",rest:"Punjabi Dhaba",img:"https://images.unsplash.com/photo-1601050690597-df0568f70950"},
{name:"Burger",price:120,unit:"piece",rest:"Fast Bites",img:"https://images.unsplash.com/photo-1550547660-d9450f859349"},
{name:"Pizza",price:250,unit:"medium",rest:"Italiano",img:"https://images.unsplash.com/photo-1548365328-9f547fb0953b"},
{name:"Pasta",price:180,unit:"plate",rest:"Italiano",img:"https://images.unsplash.com/photo-1525755662778-989d0524087e"},
{name:"French Fries",price:90,unit:"box",rest:"Fast Bites",img:"https://images.unsplash.com/photo-1573080496219-bb080dd4f877"},
{name:"Sandwich",price:100,unit:"piece",rest:"Cafe 24",img:"https://images.unsplash.com/photo-1528731708534-816fe59f90cb"},
{name:"Chocolate Cake",price:150,unit:"slice",rest:"Sweet Tooth",img:"https://images.unsplash.com/photo-1599785209707"},
{name:"Donut",price:90,unit:"piece",rest:"Sweet Tooth",img:"https://images.unsplash.com/photo-1509042239860"},
{name:"Milkshake",price:130,unit:"glass",rest:"Cafe 24",img:"https://images.unsplash.com/photo-1572490122747"},
{name:"Coffee",price:70,unit:"cup",rest:"Cafe 24",img:"https://images.unsplash.com/photo-1509042239860"},
{name:"Tea",price:40,unit:"cup",rest:"Tea Stall",img:"https://images.unsplash.com/photo-1511920170033"},
{name:"Wrap",price:110,unit:"piece",rest:"Fast Bites",img:"https://images.unsplash.com/photo-1550547660"},
{name:"Hot Dog",price:130,unit:"piece",rest:"Fast Bites",img:"https://images.unsplash.com/photo-1550547660"},
{name:"Pancake",price:140,unit:"plate",rest:"Cafe 24",img:"https://images.unsplash.com/photo-1551782450"},
{name:"Salad",price:120,unit:"bowl",rest:"Healthy Bowl",img:"https://images.unsplash.com/photo-1546069901"}
];

let cart={};

/* DISPLAY */
function displayFoods(data){
const el=document.getElementById("foodList");
el.innerHTML="";

data.forEach((f,i)=>{
const inCart=cart[f.name];

el.innerHTML+=`
<div class="card">
<img src="${f.img}">
<div class="card-body">
<div>
<div class="title">${f.name}</div>
<div class="restaurant">${f.rest}</div>
<div class="price">₹${f.price} / ${f.unit}</div>
</div>

${!inCart ? 
`<button class="btn" onclick="addToCart(${i})">Add</button>` :
`<div class="qty-box">
<span class="qty-btn" onclick="changeQty('${f.name}',-1)">-</span>
<span>${inCart.qty}</span>
<span class="qty-btn" onclick="changeQty('${f.name}',1)">+</span>
</div>`
}

</div>
</div>`;
});
}

/* SEARCH */
function searchFood(t){
displayFoods(foods.filter(f=>f.name.toLowerCase().includes(t.toLowerCase())))
}

/* CART */
function addToCart(i){
const item=foods[i];
cart[item.name]={...item,qty:1};
updateCart();displayFoods(foods);
}

function changeQty(name,d){
cart[name].qty+=d;
if(cart[name].qty<=0) delete cart[name];
updateCart();displayFoods(foods);
}

function updateCart(){
const el=document.getElementById("cartItems");
let total=0,count=0;
el.innerHTML="";

Object.values(cart).forEach(i=>{
total+=i.price*i.qty;
count+=i.qty;

el.innerHTML+=`
<div class="cart-item">
<span>${i.name} x${i.qty}</span>
<span>₹${i.price*i.qty}</span>
</div>`;
});

document.getElementById("total").innerText="Total: ₹"+total;
document.getElementById("count").innerText=count;
}

/* ORDER */
function placeOrder(){
const name=document.getElementById("name").value;
const phone=document.getElementById("phone").value;
const address=document.getElementById("address").value;
const payment=document.getElementById("payment").value;

if(!name||!phone||!address||!payment){
alert("Fill all details");return;
}
if(Object.keys(cart).length===0){
alert("Cart empty");return;
}

document.getElementById("msg").innerHTML=
"<div class='success'>✅ Order Placed Successfully</div>";

cart={};
updateCart();
displayFoods(foods);
}

/* UI */
function toggleCart(){
document.getElementById("cart").classList.toggle("active");
}

/* INIT */
displayFoods(foods);

</script>

</body>
</html>
